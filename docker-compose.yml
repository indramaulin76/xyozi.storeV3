services:
  # ============================================
  # PHP Apache Application
  # ============================================
  app:
    build:
      context: .
      dockerfile: ./Dockerfile
    container_name: xyozi_store_app
    ports:
      - "80:80"
    volumes:
      - .:/var/www/html
    environment:
      - CI_ENVIRONMENT=production
      - DB_CONNECTION=mysqli
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=topup_games
      - DB_USERNAME=docker
      - DB_PASSWORD=docker_password
      - app.baseURL=https://xyozistore.my.id
    depends_on:
      db:
        condition: service_healthy
    networks:
      - xyozi_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ============================================
  # MySQL Database
  # ============================================
  db:
    image: mysql:8.0
    container_name: xyozi_store_db
    environment:
      - MYSQL_ROOT_PASSWORD=root_password
      - MYSQL_DATABASE=topup_games
      - MYSQL_USER=docker
      - MYSQL_PASSWORD=docker_password
    volumes:
      - mysql_data_topup:/var/lib/mysql
      - ./DATABASENYA.sql:/docker-entrypoint-initdb.d/1-database.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_password"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - xyozi_network
    restart: unless-stopped

networks:
  xyozi_network:
    driver: bridge

volumes:
  mysql_data_topup:
