services:
  # ============================================
  # PHP Apache Application
  # ============================================
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: topup_games_app
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini:ro
    environment:
      - CI_ENVIRONMENT=development
      - DB_CONNECTION=mysqli
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=topup_games
      - DB_USERNAME=docker
      - DB_PASSWORD=docker_password
      - app.baseURL=http://localhost:8080
    depends_on:
      db:
        condition: service_healthy
    networks:
      - topup_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ============================================
  # MySQL Database
  # ============================================
  db:
    image: mysql:8.0
    container_name: topup_games_db
    environment:
      - MYSQL_ROOT_PASSWORD=root_password
      - MYSQL_DATABASE=topup_games
      - MYSQL_USER=docker
      - MYSQL_PASSWORD=docker_password
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf:ro
      - ./DATABASENYA.sql:/docker-entrypoint-initdb.d/1-database.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_password"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - topup_network

networks:
  topup_network:
    driver: bridge

volumes:
  mysql_data:
